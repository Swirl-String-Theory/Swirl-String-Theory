<div class="my-12 overflow-hidden rounded-xl border border-slate-800 bg-physics-card/50 backdrop-blur-sm">
  <div class="px-6 py-4 border-b border-slate-800 bg-slate-900/50">
    <h3 class="font-serif text-xl text-white">{{ title }}</h3>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full min-w-[800px]">
      <thead>
        <tr>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700">Knot</th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700"><app-math-block math="D_2(r)" /></th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700"><app-math-block math="D_{2k}" /></th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700"><app-math-block math="Z_{2k}" /></th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700"><app-math-block math="I" /></th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700">Rev</th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700">Amphi</th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700">Dark</th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700">Periods</th>
          <th class="px-4 py-3 text-left text-xs font-serif font-bold uppercase tracking-wider text-physics-muted border-b border-slate-700">FSG</th>
        </tr>
      </thead>
      <tbody>
        @for (row of data; track row.knot) {
          <tr class="hover:bg-white/5 transition-colors">
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono font-bold text-physics-cyan">{{ row.knot }}</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">@if (row.d2r) { <span class="text-green-400">✓</span> } @else { <span class="text-red-400/50">×</span> }</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">{{ row.d2k }}</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">{{ row.z2k }}</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">{{ row.i }}</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">@if (row.reversible) { <span class="text-green-400">✓</span> } @else { <span class="text-red-400/50">×</span> }</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">@if (row.amphichiral) { <span class="text-green-400">✓</span> } @else { <span class="text-red-400/50">×</span> }</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">
              <span [class]="row.dark.includes('yes') ? 'text-green-400' : 'text-physics-muted'">{{ row.dark }}</span>
            </td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">{{ row.periods }}</td>
            <td class="px-4 py-3 text-sm text-physics-text border-b border-slate-800/50 font-mono">{{ row.fsg }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
