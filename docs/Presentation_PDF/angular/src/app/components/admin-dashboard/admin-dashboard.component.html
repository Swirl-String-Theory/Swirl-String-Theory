@if (!cms.isAdmin()) {
  <button
    type="button"
    (click)="openAdmin()"
    class="fixed bottom-6 right-6 z-[100] p-4 bg-physics-cyan/20 border border-physics-cyan/40 text-physics-cyan rounded-full hover:bg-physics-cyan/40 transition-all shadow-lg backdrop-blur-md group"
  >
    <lucide-icon
      [img]="icons.Settings"
      class="group-hover:rotate-90 transition-transform duration-500"
      [size]="24"
    />
  </button>
} @else {
  <div
    class="fixed inset-y-0 right-0 w-full md:w-96 bg-physics-card/95 backdrop-blur-xl border-l border-slate-800 z-[101] shadow-2xl flex flex-col animate-fade-in"
  >
    <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-black/20">
      <h2 class="font-serif text-xl text-white flex items-center gap-2">
        <lucide-icon [img]="icons.Settings" [size]="20" class="text-physics-cyan" />
        Content Management
      </h2>
      <button type="button" (click)="closeAdmin()" class="text-slate-400 hover:text-white transition-colors">
        <lucide-icon [img]="icons.X" [size]="20" />
      </button>
    </div>

    <div class="flex-1 overflow-y-auto p-6 space-y-8">
      <section class="space-y-4">
        <h3 class="text-[10px] font-bold uppercase tracking-widest text-physics-muted border-b border-slate-800 pb-2">
          Hero Section
        </h3>
        <div class="space-y-3">
          <div>
            <label class="text-[10px] text-physics-cyan uppercase block mb-1">Title</label>
            <input
              [ngModel]="cms.content().hero.title"
              (ngModelChange)="cms.updateHeroField('title', $event)"
              class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-white focus:border-physics-cyan outline-none"
            />
          </div>
          <div>
            <label class="text-[10px] text-physics-cyan uppercase block mb-1">Subtitle</label>
            <input
              [ngModel]="cms.content().hero.subtitle"
              (ngModelChange)="cms.updateHeroField('subtitle', $event)"
              class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-white focus:border-physics-cyan outline-none"
            />
          </div>
          <div>
            <label class="text-[10px] text-physics-cyan uppercase block mb-1">Description</label>
            <textarea
              [ngModel]="cms.content().hero.description"
              (ngModelChange)="cms.updateHeroField('description', $event)"
              rows="3"
              class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-white focus:border-physics-cyan outline-none resize-none"
            ></textarea>
          </div>
        </div>
      </section>

      <section class="space-y-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-2">
          <h3 class="text-[10px] font-bold uppercase tracking-widest text-physics-muted">Papers (The Series)</h3>
          <button type="button" (click)="cms.addPaper()" class="text-physics-cyan hover:bg-physics-cyan/10 p-1 rounded">
            <lucide-icon [img]="icons.Plus" [size]="16" />
          </button>
        </div>
        <div class="space-y-3">
          @for (paper of cms.content().papers; track paper.id) {
            <div class="group flex gap-2 items-start">
              <input
                [ngModel]="paper.title"
                (ngModelChange)="cms.updatePaperTitle(paper.id, $event)"
                class="flex-1 bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white focus:border-physics-cyan outline-none"
              />
              <button
                type="button"
                (click)="cms.removePaper(paper.id)"
                class="p-2 text-slate-600 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all"
              >
                <lucide-icon [img]="icons.Trash2" [size]="14" />
              </button>
            </div>
          }
        </div>
      </section>

      <section class="pt-6 border-t border-slate-800">
        <button
          type="button"
          (click)="cms.resetToDefault()"
          class="w-full flex items-center justify-center gap-2 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded text-xs font-bold uppercase tracking-widest"
        >
          <lucide-icon [img]="icons.RotateCcw" [size]="14" /> Reset to Default
        </button>
      </section>
    </div>

    <div class="p-6 bg-black/40 border-t border-slate-800 text-[10px] text-physics-muted italic text-center">
      Changes are automatically saved to local storage.
    </div>
  </div>
}
